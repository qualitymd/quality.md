name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write # OIDC token for npm provenance attestations

# Never run two releases for the same tag concurrently, and never cancel a
# release mid-publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Verify release credentials
        run: node scripts/release-preflight.mjs "$GITHUB_REF_NAME" --credentials-only
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4

      - name: Install pinned dependencies
        run: bun install --frozen-lockfile

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Extract curated release notes
        run: node scripts/extract-release-notes.mjs "$GITHUB_REF_NAME" > "$RUNNER_TEMP/release-notes.md"

      - name: Remove stale draft release on rerun
        run: |
          draft="$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq .isDraft 2>/dev/null || true)"
          if [ "$draft" = "true" ]; then
            gh release delete "$GITHUB_REF_NAME" --yes
          elif [ "$draft" = "false" ]; then
            echo "Release $GITHUB_REF_NAME already exists and is not draft" >&2
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build standalone release archives
        run: bun scripts/build-release.ts "$GITHUB_REF_NAME" "$GITHUB_SHA"

      - name: Create draft GitHub release
        run: >-
          gh release create "$GITHUB_REF_NAME"
          dist/*.tar.gz dist/*.zip dist/checksums.txt dist/metadata.json dist/artifacts.json
          --draft --title "$GITHUB_REF_NAME" --notes-file "${{ runner.temp }}/release-notes.md"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    runs-on: ubuntu-latest
    needs: github-release
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Update Homebrew tap
        run: node scripts/update-homebrew-cask.mjs "$GITHUB_REF_NAME"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  npm:
    runs-on: ubuntu-latest
    needs: github-release
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Install pinned dependencies
        run: bun install --frozen-lockfile

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        run: node scripts/build-npm.mjs "${GITHUB_REF_NAME#v}" --publish --skip-existing
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Emit signed build provenance for every published package.
          NPM_CONFIG_PROVENANCE: "true"

  verify:
    runs-on: ubuntu-latest
    needs: [github-release, homebrew, npm]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Verify release channels before publishing draft
        run: node scripts/release-verify.mjs "$GITHUB_REF_NAME" --allow-draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Publish GitHub release
        run: gh release edit "$GITHUB_REF_NAME" --repo qualitymd/quality.md --draft=false --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
