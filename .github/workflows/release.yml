name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write # OIDC token for npm provenance attestations

# Never run two releases for the same tag concurrently, and never cancel a
# release mid-publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # GitHub release archives + Homebrew tap.
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Token with write access to the qualitymd/homebrew-tap repo.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      # npm / npx channel (prebuilt per-platform binaries).
      - name: Publish to npm
        run: node scripts/build-npm.mjs "${GITHUB_REF_NAME#v}" --publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Emit signed build provenance for every published package.
          NPM_CONFIG_PROVENANCE: "true"
