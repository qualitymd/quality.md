name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # GitHub release archives + Homebrew tap.
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Token with write access to the qualitymd/homebrew-tap repo.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      # npm / npx channel (prebuilt per-platform binaries).
      - name: Publish to npm
        run: node scripts/build-npm.mjs "${GITHUB_REF_NAME#v}" --publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
