name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid PR pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Installs the tools pinned in mise.toml (go, golangci-lint, dprint, …)
      # so CI and `mise run check` stay in lockstep.
      - uses: jdx/mise-action@v4

      # Fails if any Go file is not gofmt-clean.
      - name: Check Go formatting
        run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }

      # vet, lint (golangci-lint), test, and Markdown format check.
      - name: Run checks
        run: mise run check
