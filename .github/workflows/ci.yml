name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid PR pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Installs the tools pinned in mise.toml (go, golangci-lint, prettier, …)
      # so CI and `mise run check` stay in lockstep.
      - uses: jdx/mise-action@v4

      # format, tidy, vet, lint, test, Markdown, and npm package checks.
      - name: Run checks
        run: mise run check
