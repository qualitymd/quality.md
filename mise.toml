[tools]
bun = "1.3.14"
node = "22"
"npm:prettier" = "3.9.5"

[tasks.install]
description = "Install exact TypeScript dependencies"
run = "bun install --frozen-lockfile"

[tasks.build]
description = "Build the host qualitymd standalone executable into ./dist"
run = "bun run build"

[tasks.run]
description = "Run the qualitymd CLI from TypeScript source"
run = "bun run src/main.ts"

[tasks.test]
description = "Run the TypeScript test suite"
run = "bun run test"

[tasks.typecheck]
description = "Type-check the TypeScript runtime"
run = "bun run typecheck"

[tasks.lint]
description = "Lint the TypeScript runtime and tests"
run = "bun run lint"

[tasks.check]
description = "Run the complete local gate"
depends = ["typecheck", "lint", "test", "fmt-check", "fmt-md-check", "schema-check", "report-gallery-check", "sync-spec-docs-check", "cli-docs-check", "docs-links-check", "npm-pack-check"]

[tasks.fmt]
description = "Format TypeScript, JavaScript, Markdown, and MDX"
run = ["bun run fmt", "prettier --write \"**/*.{md,mdx}\""]

[tasks.fmt-check]
description = "Check TypeScript formatting"
run = "bun run fmt:check"

[tasks.fmt-md]
description = "Format Markdown and MDX files"
run = "prettier --write \"**/*.{md,mdx}\""

[tasks.fmt-md-check]
description = "Check Markdown and MDX formatting"
run = "prettier --check \"**/*.{md,mdx}\""

[tasks.hooks]
description = "Install the repository git hooks"
run = "git config core.hooksPath .githooks"

[tasks.snapshot]
description = "Build all standalone release targets without publishing"
run = "bun scripts/build-release.ts v0.0.0-dev dev"

[tasks.npm-build]
description = "Cross-compile and assemble the npm packages without publishing"
usage = 'arg "[version]" default="0.0.0-dev"'
run = 'node scripts/build-npm.mjs "${usage_version?}"'

[tasks.npm-pack-check]
description = "Verify the npm launcher package includes the generated root README"
run = "node scripts/check-npm-package.mjs"

[tasks.report-gallery]
description = "Regenerate the checked-in evaluation report gallery examples"
run = "bun scripts/report-gallery.ts"

[tasks.schema]
description = "Regenerate the companion QUALITY.md JSON Schema"
run = "bun scripts/quality-schema.ts"

[tasks.schema-check]
description = "Verify the companion JSON Schema is current"
run = "bun run test test/integration/quality-schema.test.ts"

[tasks.report-gallery-check]
description = "Verify generated report gallery examples are current"
run = "node scripts/check-generated.mjs bun scripts/report-gallery.ts -- examples/report-gallery"

[tasks.sync-spec-docs]
description = "Regenerate the Mintlify specification page from SPECIFICATION.md"
run = "node scripts/sync-spec-docs.mjs"

[tasks.sync-spec-docs-check]
description = "Verify the generated Mintlify specification page is current"
run = "node scripts/check-generated.mjs node scripts/sync-spec-docs.mjs -- mintlify/specification.mdx"

[tasks.cli-docs]
description = "Regenerate the Mintlify CLI reference page"
run = "bun scripts/cli-docs.ts"

[tasks.cli-docs-check]
description = "Verify the generated Mintlify CLI reference page is current"
run = "node scripts/check-generated.mjs bun scripts/cli-docs.ts -- mintlify/cli.mdx"

[tasks.docs-deps]
description = "Install the pinned Mintlify docs toolchain if missing"
dir = "mintlify"
run = "[ -d node_modules ] || npm ci --no-audit --no-fund"

[tasks.docs-links-check]
description = "Check the Mintlify docs site for broken links"
depends = ["docs-deps", "sync-spec-docs-check", "cli-docs-check"]
dir = "mintlify"
run = "npm exec --no -- mint broken-links"

[tasks.npm-publish]
description = "Cross-compile, assemble, and publish the npm packages"
usage = '''
arg "<version>"
flag "--skip-existing"
'''
run = '''
args="${usage_version?} --publish"
if [ "${usage_skip_existing:-false}" = "true" ]; then args="$args --skip-existing"; fi
node scripts/build-npm.mjs $args
'''

[tasks.release-notes]
description = "Print the CHANGELOG.md section for a release tag"
usage = 'arg "<tag>"'
quiet = true
run = 'node scripts/extract-release-notes.mjs "${usage_tag?}"'

[tasks.release-check]
description = "Run pre-tag release checks for a prepared release commit"
usage = '''
arg "<tag>"
flag "--skip-clean"
flag "--skip-tag-check"
flag "--skip-gates"
'''
run = '''
args="${usage_tag?}"
if [ "${usage_skip_clean:-false}" = "true" ]; then args="$args --skip-clean"; fi
if [ "${usage_skip_tag_check:-false}" = "true" ]; then args="$args --skip-tag-check"; fi
if [ "${usage_skip_gates:-false}" = "true" ]; then args="$args --skip-gates"; fi
node scripts/check-release.mjs $args
'''

[tasks.release-preflight]
description = "Verify release target availability and publish credentials before tagging"
usage = '''
arg "<tag>"
flag "--credentials-only"
'''
run = '''
args="${usage_tag?}"
if [ "${usage_credentials_only:-false}" = "true" ]; then args="$args --credentials-only"; fi
node scripts/release-preflight.mjs $args
'''

[tasks.release-homebrew]
description = "Update the Homebrew tap cask for a release tag"
usage = 'arg "<tag>"'
run = 'node scripts/update-homebrew-cask.mjs "${usage_tag?}"'

[tasks.release-verify]
description = "Verify GitHub, npm, Homebrew, and binary release artifacts"
usage = '''
arg "<tag>"
flag "--allow-draft"
'''
run = '''
args="${usage_tag?}"
if [ "${usage_allow_draft:-false}" = "true" ]; then args="$args --allow-draft"; fi
node scripts/release-verify.mjs $args
'''

[tasks.release-repair]
description = "Repair safe-to-rerun release channels for a tag, then verify"
usage = 'arg "<tag>"'
run = 'node scripts/repair-release.mjs "${usage_tag?}"'
