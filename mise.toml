[tools]
dprint = "0.54.0"
go = "1.26"
goreleaser = "latest"
golangci-lint = "2"
node = "22"

[tasks.build]
description = "Build the qualitymd binary into ./dist"
run = "go build -o dist/qualitymd ./cmd/qualitymd"

[tasks.run]
description = "Run the QUALITY.md CLI"
run = "go run ./cmd/qualitymd"

[tasks.test]
description = "Run the test suite"
run = "go test ./..."

[tasks.vet]
description = "Vet the codebase"
run = "go vet ./..."

[tasks.lint]
description = "Lint the Go codebase with golangci-lint"
run = "golangci-lint run"

[tasks.check]
description = "Run the full CI gate locally (vet, lint, test, format, npm package check)"
depends = ["vet", "lint", "test", "fmt-md-check", "npm-pack-check"]

[tasks.fmt]
description = "Format the codebase (Go + Markdown)"
run = ["gofmt -w .", "dprint fmt"]

[tasks.fmt-md]
description = "Format Markdown files with dprint"
run = "dprint fmt"

[tasks.fmt-md-check]
description = "Check Markdown formatting without writing (CI-friendly)"
run = "dprint check"

[tasks.hooks]
description = "Install the repo's git hooks (run once after clone)"
run = "git config core.hooksPath .githooks"

[tasks.tidy]
description = "Tidy module dependencies"
run = "go mod tidy"

[tasks.snapshot]
description = "Build a local goreleaser snapshot (no publish)"
run = "goreleaser release --snapshot --clean"

[tasks.npm-build]
description = "Cross-compile and assemble the npm packages (no publish)"
usage = 'arg "[version]" default="0.0.0-dev"'
run = 'node scripts/build-npm.mjs "${usage_version?}"'

[tasks.npm-pack-check]
description = "Verify the npm launcher package includes the generated root README"
run = "node scripts/check-npm-package.mjs"

[tasks.npm-publish]
description = "Cross-compile, assemble, and publish the npm packages"
usage = 'arg "<version>"'
run = 'node scripts/build-npm.mjs "${usage_version?}" --publish'

[tasks.release-notes]
description = "Print the CHANGELOG.md section for a release tag"
usage = 'arg "<tag>"'
quiet = true
run = 'node scripts/extract-release-notes.mjs "${usage_tag?}"'

[tasks.release-check]
description = "Run pre-tag release checks for a prepared release commit"
usage = '''
arg "<tag>"
flag "--skip-clean"
flag "--skip-tag-check"
flag "--skip-gates"
'''
run = '''
args="${usage_tag?}"
if [ "${usage_skip_clean:-false}" = "true" ]; then args="$args --skip-clean"; fi
if [ "${usage_skip_tag_check:-false}" = "true" ]; then args="$args --skip-tag-check"; fi
if [ "${usage_skip_gates:-false}" = "true" ]; then args="$args --skip-gates"; fi
node scripts/check-release.mjs $args
'''
