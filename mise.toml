[tools]
dprint = "0.54.0"
go = "1.26"
goreleaser = "latest"
golangci-lint = "2"
node = "22"

[tasks.build]
description = "Build the qualitymd binary into ./dist"
run = "go build -o dist/qualitymd ./cmd/qualitymd"

[tasks.run]
description = "Run the QUALITY.md CLI"
run = "go run ./cmd/qualitymd"

[tasks.test]
description = "Run the test suite"
run = "go test ./..."

[tasks.vet]
description = "Vet the codebase"
run = "go vet ./..."

[tasks.lint]
description = "Lint the Go codebase with golangci-lint"
run = "golangci-lint run"

[tasks.fmt-go-check]
description = "Check Go formatting without writing (CI-friendly)"
run = '''
unformatted="$(gofmt -l .)"
if [ -n "$unformatted" ]; then
	printf 'Go files need gofmt:\n%s\n' "$unformatted"
	exit 1
fi
'''

[tasks.check]
description = "Run the full CI gate locally (format, tidy, vet, lint, test, npm package check)"
depends = ["fmt-go-check", "tidy-check", "vet", "lint", "test", "fmt-md-check", "npm-pack-check"]

[tasks.fmt]
description = "Format the codebase (Go + Markdown)"
run = ["gofmt -w .", "dprint fmt"]

[tasks.fmt-md]
description = "Format Markdown files with dprint"
run = "dprint fmt"

[tasks.fmt-md-check]
description = "Check Markdown formatting without writing (CI-friendly)"
run = "dprint check"

[tasks.hooks]
description = "Install the repo's git hooks (run once after clone)"
run = "git config core.hooksPath .githooks"

[tasks.tidy]
description = "Tidy module dependencies"
run = "go mod tidy"

[tasks.tidy-check]
description = "Verify go mod tidy leaves go.mod and go.sum unchanged"
run = '''
tmpdir="$(mktemp -d)"
cp go.mod "$tmpdir/go.mod"
cp go.sum "$tmpdir/go.sum"
trap 'rm -rf "$tmpdir"' EXIT

go mod tidy -modfile="$tmpdir/go.mod"
if ! cmp -s "$tmpdir/go.mod" go.mod || ! cmp -s "$tmpdir/go.sum" go.sum; then
	printf 'go mod tidy changed go.mod or go.sum. Review and stage the changes.\n'
	diff -u --label go.mod --label 'go.mod (tidied)' go.mod "$tmpdir/go.mod" || true
	diff -u --label go.sum --label 'go.sum (tidied)' go.sum "$tmpdir/go.sum" || true
	exit 1
fi
'''

[tasks.snapshot]
description = "Build a local goreleaser snapshot (no publish)"
run = "goreleaser release --snapshot --clean"

[tasks.npm-build]
description = "Cross-compile and assemble the npm packages (no publish)"
usage = 'arg "[version]" default="0.0.0-dev"'
run = 'node scripts/build-npm.mjs "${usage_version?}"'

[tasks.npm-pack-check]
description = "Verify the npm launcher package includes the generated root README"
run = "node scripts/check-npm-package.mjs"

[tasks.npm-publish]
description = "Cross-compile, assemble, and publish the npm packages"
usage = '''
arg "<version>"
flag "--skip-existing"
'''
run = '''
args="${usage_version?} --publish"
if [ "${usage_skip_existing:-false}" = "true" ]; then args="$args --skip-existing"; fi
node scripts/build-npm.mjs $args
'''

[tasks.release-notes]
description = "Print the CHANGELOG.md section for a release tag"
usage = 'arg "<tag>"'
quiet = true
run = 'node scripts/extract-release-notes.mjs "${usage_tag?}"'

[tasks.release-check]
description = "Run pre-tag release checks for a prepared release commit"
usage = '''
arg "<tag>"
flag "--skip-clean"
flag "--skip-tag-check"
flag "--skip-gates"
'''
run = '''
args="${usage_tag?}"
if [ "${usage_skip_clean:-false}" = "true" ]; then args="$args --skip-clean"; fi
if [ "${usage_skip_tag_check:-false}" = "true" ]; then args="$args --skip-tag-check"; fi
if [ "${usage_skip_gates:-false}" = "true" ]; then args="$args --skip-gates"; fi
node scripts/check-release.mjs $args
'''

[tasks.release-preflight]
description = "Verify release target availability and publish credentials before tagging"
usage = '''
arg "<tag>"
flag "--credentials-only"
'''
run = '''
args="${usage_tag?}"
if [ "${usage_credentials_only:-false}" = "true" ]; then args="$args --credentials-only"; fi
node scripts/release-preflight.mjs $args
'''

[tasks.release-homebrew]
description = "Update the Homebrew tap cask for a release tag"
usage = 'arg "<tag>"'
run = 'node scripts/update-homebrew-cask.mjs "${usage_tag?}"'

[tasks.release-verify]
description = "Verify GitHub, npm, Homebrew, and binary release artifacts"
usage = '''
arg "<tag>"
flag "--allow-draft"
'''
run = '''
args="${usage_tag?}"
if [ "${usage_allow_draft:-false}" = "true" ]; then args="$args --allow-draft"; fi
node scripts/release-verify.mjs $args
'''

[tasks.release-repair]
description = "Repair safe-to-rerun release channels for a tag, then verify"
usage = 'arg "<tag>"'
run = 'node scripts/repair-release.mjs "${usage_tag?}"'
