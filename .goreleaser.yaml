# goreleaser configuration. Builds cross-platform binaries and publishes GitHub
# release archives. The Homebrew tap and npm/npx channels are handled separately
# by scripts/update-homebrew-cask.mjs and scripts/build-npm.mjs so release
# retries can repair each channel independently.
version: 2

project_name: qualitymd

before:
  hooks:
    - go mod tidy

builds:
  - id: qualitymd
    main: ./cmd/qualitymd
    binary: qualitymd
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/qualitymd/quality.md/internal/cli.version={{ .Version }}
      - -X github.com/qualitymd/quality.md/internal/cli.commit={{ .Commit }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: qualitymd
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

release:
  github:
    owner: qualitymd
    name: quality.md

changelog:
  use: github
  sort: asc
