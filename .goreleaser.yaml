# goreleaser configuration. Builds cross-platform binaries and publishes
# GitHub release archives + a Homebrew tap. The npm/npx channel is handled
# separately by scripts/build-npm.mjs (see `mise run npm-publish`).
version: 2

project_name: qualitymd

before:
  hooks:
    - go mod tidy

builds:
  - id: qualitymd
    main: ./cmd/qualitymd
    binary: qualitymd
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/qualitymd/quality.md/internal/cli.version={{ .Version }}
      - -X github.com/qualitymd/quality.md/internal/cli.commit={{ .Commit }}
      - -X github.com/qualitymd/quality.md/internal/cli.date={{ .Date }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: qualitymd
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

homebrew_casks:
  - name: qualitymd
    repository:
      owner: qualitymd
      name: homebrew-tap
    homepage: "https://github.com/qualitymd/quality.md"
    description: "Evaluate QUALITY.md specifications"
    license: "MIT"
    # Strip the quarantine xattr so the unsigned binary runs without a Gatekeeper
    # prompt. Drop this once the binaries are signed and notarized.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/qualitymd"]
          end

release:
  github:
    owner: qualitymd
    name: quality.md

changelog:
  use: github
  sort: asc
